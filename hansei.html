<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>行事の反省 入力フォーム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(0,0,0,0.1);}
html,body{height:100%;background:#f2f2f7;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;color:#1c1c1e;}
.app{max-width:560px;margin:0 auto;padding-bottom:40px;}
.screen{display:none;}.screen.active{display:block;}
.navbar{background:#fff;padding:14px 16px 10px;border-bottom:1px solid #e5e5ea;position:sticky;top:0;z-index:10;}
.navbar-title{font-size:18px;font-weight:700;margin-bottom:8px;}
.seg{display:flex;background:#e5e5ea;border-radius:9px;padding:2px;}
.seg button{flex:1;padding:8px;border:none;background:transparent;border-radius:7px;font-size:14px;font-weight:500;color:#666;cursor:pointer;}
.seg button.active{background:#fff;color:#1c1c1e;font-weight:600;}
.content{padding:16px;}
.sec-title{font-size:12px;font-weight:600;color:#8e8e93;letter-spacing:.05em;margin-bottom:8px;}
.hint{font-size:12px;color:#8e8e93;margin-bottom:10px;}
.list-group{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:16px;}
.list-item{display:flex;align-items:center;border-bottom:1px solid #e5e5ea;background:#fff;}
.list-item:last-child{border-bottom:none;}
.list-item.drag-over{border-top:2px solid #007AFF;}
.drag-handle{padding:14px 10px 14px 16px;color:#c7c7cc;font-size:20px;cursor:grab;touch-action:none;flex-shrink:0;}
.list-item-main{flex:1;padding:10px 0;cursor:default;}
.list-item-name{font-size:16px;font-weight:500;color:#1c1c1e;margin-bottom:5px;}
.cls-status-row{display:flex;flex-wrap:wrap;gap:5px;}
.cls-dot-item{display:flex;align-items:center;gap:3px;font-size:11px;color:#8e8e93;}
.dot-sm{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dot-green{background:#34c759;}.dot-gray{background:#c7c7cc;}
.go-btn{padding:10px 16px;background:transparent;border:none;color:#007AFF;font-size:22px;cursor:pointer;flex-shrink:0;}
.progress-badge{font-size:12px;padding:3px 8px;border-radius:10px;white-space:nowrap;font-weight:600;}
.badge-complete{background:#d1fae5;color:#065f46;}
.badge-partial{background:#fef3c7;color:#92400e;}
.badge-none{background:#f2f2f7;color:#8e8e93;}
.form-group{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:16px;}
.form-row{padding:13px 16px;border-bottom:1px solid #e5e5ea;}
.form-row:last-child{border-bottom:none;}
.form-label{font-size:12px;color:#8e8e93;margin-bottom:8px;}
.cls-chips{display:flex;flex-wrap:wrap;gap:8px;}
.cls-chip{padding:8px 14px;background:#f2f2f7;border:1.5px solid #e5e5ea;border-radius:20px;font-size:14px;color:#555;cursor:pointer;user-select:none;position:relative;}
.cls-chip.selected{background:#007AFF;color:#fff;border-color:#007AFF;}
.cls-chip.done{border-color:#34c759;}
.cls-chip.done::after{content:'✓';position:absolute;top:-4px;right:-4px;background:#34c759;color:#fff;border-radius:50%;width:14px;height:14px;font-size:9px;line-height:14px;text-align:center;}
select{width:100%;border:none;outline:none;font-size:16px;font-family:inherit;background:transparent;color:#1c1c1e;-webkit-appearance:none;padding:4px 0;}
textarea,input[type=text],input[type=password]{width:100%;border:none;outline:none;font-size:16px;font-family:inherit;background:transparent;color:#1c1c1e;-webkit-appearance:none;}
textarea{min-height:160px;resize:none;line-height:1.6;}
.btn-p{display:block;width:100%;padding:16px;background:#007AFF;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;margin-bottom:10px;}
.btn-p:active{background:#0062cc;}
.btn-s{display:block;width:100%;padding:16px;background:#fff;color:#007AFF;border:none;border-radius:12px;font-size:17px;cursor:pointer;margin-bottom:10px;}
.btn-danger{display:block;width:100%;padding:16px;background:#fff;color:#ff3b30;border:none;border-radius:12px;font-size:17px;cursor:pointer;margin-bottom:10px;}
.back{color:#007AFF;font-size:16px;cursor:pointer;padding:4px 0;margin-bottom:4px;display:inline-block;}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:7px 14px;background:#fff;border:1px solid #ddd;border-radius:20px;font-size:13px;color:#555;cursor:pointer;}
.chip.active{background:#007AFF;color:#fff;border-color:#007AFF;}
.cls-progress-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:16px;}
.cls-progress-title{font-size:12px;font-weight:600;color:#8e8e93;margin-bottom:10px;}
.cls-progress-list{display:flex;flex-wrap:wrap;gap:8px;}
.cls-progress-item{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;font-size:13px;font-weight:500;}
.cls-progress-item.done{background:#d1fae5;color:#065f46;}
.cls-progress-item.notdone{background:#f2f2f7;color:#8e8e93;}
.cls-progress-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.cls-progress-item.done .cls-progress-dot{background:#34c759;}
.cls-progress-item.notdone .cls-progress-dot{background:#c7c7cc;}
.entry{background:#fff;border-radius:12px;padding:13px 16px;margin-bottom:10px;}
.entry-cls{display:inline-block;font-size:12px;padding:2px 8px;border-radius:8px;background:#e8f0fe;color:#1a56db;margin-bottom:6px;}
.entry-txt{font-size:15px;line-height:1.6;white-space:pre-wrap;}
.copy-box{background:#fff;border-radius:12px;padding:14px 16px;font-size:14px;white-space:pre-wrap;line-height:1.7;min-height:60px;margin-bottom:12px;}
.empty{text-align:center;padding:40px;color:#8e8e93;font-size:15px;}
.err{color:#ff3b30;font-size:14px;margin-top:8px;}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;display:none;z-index:999;}
.success-wrap{text-align:center;padding:60px 20px;}
.success-icon{font-size:64px;margin-bottom:16px;}
.success-title{font-size:22px;font-weight:700;margin-bottom:8px;}
.success-sub{font-size:15px;color:#8e8e93;margin-bottom:32px;}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal{background:#fff;border-radius:16px;padding:24px 20px;width:92%;max-width:420px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;text-align:center;}
.modal-label{font-size:12px;color:#8e8e93;margin-bottom:8px;margin-top:16px;}
.modal input[type=text]{width:100%;font-size:16px;padding:12px;border:1px solid #e5e5ea;border-radius:10px;outline:none;font-family:inherit;}
.modal-btns{margin-top:16px;display:flex;flex-direction:column;gap:8px;}
.modal-cls-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.modal-cls-chip{padding:8px 14px;background:#f2f2f7;border:1.5px solid #e5e5ea;border-radius:20px;font-size:14px;color:#555;cursor:pointer;user-select:none;}
.modal-cls-chip.selected{background:#007AFF;color:#fff;border-color:#007AFF;}
.login-wrap{padding:40px 16px;}
.login-logo{font-size:40px;text-align:center;margin-bottom:8px;}
.login-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px;}
.login-sub{font-size:14px;color:#8e8e93;text-align:center;margin-bottom:32px;}
.year-btns{display:flex;gap:8px;flex-wrap:wrap;}
.year-btn{flex:1;min-width:100px;padding:12px;background:#f2f2f7;border:1.5px solid #e5e5ea;border-radius:12px;font-size:15px;font-weight:500;color:#1c1c1e;cursor:pointer;text-align:center;}
.year-btn.active{background:#007AFF;color:#fff;border-color:#007AFF;}
.context-bar{background:#fff;border-bottom:1px solid #e5e5ea;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;}
.context-info{font-size:13px;color:#8e8e93;}
.context-info span{color:#1c1c1e;font-weight:600;}
.logout-btn{font-size:13px;cursor:pointer;background:none;border:none;padding:4px 8px;}
</style>
</head>
<body>
<div class="app">

<div id="s-login" class="screen active">
  <div class="content">
    <div class="login-wrap">
      <div class="login-logo">🏫</div>
      <div class="login-title">行事の反省 入力フォーム</div>
      <div class="login-sub">園名とパスワードを入力してください</div>
      <div class="form-group">
        <div class="form-row">
          <div class="form-label">園名</div>
          <select id="login-garden">
            <option value="">選択してください</option>
            <option>西新</option>
            <option>原</option>
            <option>たの津</option>
            <option>ちくし野</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-label">パスワード</div>
          <input type="password" id="login-pw" placeholder="パスワードを入力">
        </div>
      </div>
      <button class="btn-p" id="login-btn">ログイン</button>
      <p class="err" id="login-err"></p>
    </div>
  </div>
</div>

<div id="s-year" class="screen">
  <div class="content">
    <div class="login-wrap">
      <div class="login-logo">📅</div>
      <div class="login-title" id="year-garden-name"></div>
      <div class="login-sub">年度を選択してください</div>
      <div class="year-btns" id="year-btns"></div>
      <div style="margin-top:16px;">
        <button class="btn-s" id="back-to-login">← 園選択に戻る</button>
      </div>
    </div>
  </div>
</div>

<div id="s-home" class="screen">
  <div class="context-bar">
    <div class="context-info"><span id="ctx-garden"></span>・<span id="ctx-year"></span></div>
    <div style="display:flex;gap:4px;">
      <button class="logout-btn" id="change-year-btn" style="color:#007AFF;">年度変更</button>
      <button class="logout-btn" id="logout-btn" style="color:#ff3b30;">ログアウト</button>
    </div>
  </div>
  <div class="navbar">
    <div class="navbar-title">行事の反省 入力フォーム</div>
    <div class="seg">
      <button id="t-input">入力</button>
      <button id="t-summary">取りまとめ</button>
    </div>
  </div>
  <div class="content">
    <div id="p-input">
      <p class="sec-title">行事を選択</p>
      <p class="hint">長押しで編集 ／ ☰ をドラッグで並び替え</p>
      <div class="list-group" id="ev-list"><p class="empty">読み込み中...</p></div>
      <button class="btn-s" id="btn-add-ev">＋ 行事を追加</button>
    </div>
    <div id="p-summary" style="display:none">
      <p class="sec-title">反省取りまとめ</p>
      <div class="list-group" id="sum-list"><p class="empty">読み込み中...</p></div>
    </div>
  </div>
</div>

<div id="s-input" class="screen">
  <div class="navbar">
    <div class="back" id="back-input">‹ 行事一覧</div>
    <div class="navbar-title" id="input-title"></div>
  </div>
  <div class="content">
    <div class="cls-progress-card">
      <div class="cls-progress-title">提出状況</div>
      <div class="cls-progress-list" id="input-cls-progress"></div>
    </div>
    <div class="form-group">
      <div class="form-row">
        <div class="form-label">記入者クラス（複数選択可）</div>
        <div class="cls-chips" id="cls-chips"></div>
      </div>
      <div class="form-row">
        <div class="form-label">反省・気づき</div>
        <textarea id="hansei" placeholder="気づいたこと、改善点、良かった点など"></textarea>
      </div>
    </div>
    <button class="btn-p" id="submit-btn">送信する</button>
    <button class="btn-s" id="cancel-btn">キャンセル</button>
    <p class="err" id="input-err"></p>
  </div>
</div>

<div id="s-entries" class="screen">
  <div class="navbar">
    <div class="back" id="back-entries">‹ 行事一覧</div>
    <div class="navbar-title" id="entries-title"></div>
  </div>
  <div class="content">
    <div class="cls-progress-card">
      <div class="cls-progress-title">提出状況</div>
      <div class="cls-progress-list" id="entries-cls-progress"></div>
    </div>
    <button class="btn-s" id="reload-btn" style="padding:10px;margin-bottom:12px;">再読み込み</button>
    <div class="chips" id="chips"></div>
    <div id="entries-list"></div>
    <p class="sec-title">まとめてコピー</p>
    <div class="copy-box" id="copy-box"></div>
    <button class="btn-p" id="copy-btn">まとめてコピー</button>
  </div>
</div>

<div id="s-add" class="screen">
  <div class="navbar">
    <div class="back" id="back-add">‹ 行事一覧</div>
    <div class="navbar-title">行事を追加</div>
  </div>
  <div class="content">
    <div class="form-group">
      <div class="form-row">
        <div class="form-label">行事名</div>
        <input type="text" id="new-ev" placeholder="例：運動会、お遊戯会...">
      </div>
      <div class="form-row">
        <div class="form-label">対象クラス（複数選択可）</div>
        <div class="cls-chips" id="new-ev-cls-chips"></div>
      </div>
    </div>
    <button class="btn-p" id="save-ev-btn">追加する</button>
    <button class="btn-s" id="cancel-add-btn">キャンセル</button>
    <p class="err" id="add-err"></p>
  </div>
</div>

<div id="s-success" class="screen">
  <div class="success-wrap">
    <div class="success-icon">✅</div>
    <div class="success-title">送信しました</div>
    <div class="success-sub">スプレッドシートに保存されました</div>
    <button class="btn-p" id="back-success">行事一覧に戻る</button>
  </div>
</div>

</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">行事を編集</div>
    <div class="modal-label">行事名</div>
    <input type="text" id="edit-ev-input" placeholder="行事名">
    <div class="modal-label">対象クラス（複数選択可）</div>
    <div class="modal-cls-chips" id="edit-cls-chips"></div>
    <div class="modal-btns">
      <button class="btn-p" id="edit-save-btn">保存する</button>
      <button class="btn-danger" id="edit-delete-btn">削除する</button>
      <button class="btn-s" id="edit-cancel-btn">キャンセル</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var GAS='https://script.google.com/macros/s/AKfycbxcoORrvnJMx2yL_Nsp8GP0NaYwNqo9HMmWaJ1qB-4xo7fMvdyAVoYcW35DwcRfi1b9qQ/exec';
var GARDENS={
  '西新':   ['0歳児クラス','1歳児クラス','2歳児クラス','3歳児クラス','4歳児クラス','5歳児クラス'],
  '原':     ['0歳児クラス','1歳児クラス','2歳児クラス'],
  'たの津': ['0歳児クラス','1歳児クラス','2歳児クラス','3歳児クラス','4歳児クラス','5歳児クラス'],
  'ちくし野':['0歳児クラス','1歳児クラス','2歳児クラス'],
};

var currentGarden='',currentYear='',currentClasses=[];
var events=[],currentEvent=null,currentFilter='all',currentTab='input',allEntries=[];
var editingIndex=-1,selectedClasses=[],newEvSelectedClasses=[],editSelectedClasses=[];

function $(i){return document.getElementById(i);}
function showScreen(i){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});$(i).classList.add('active');window.scrollTo(0,0);}
function showToast(m){var t=$('toast');t.textContent=m||'コピーしました';t.style.display='block';setTimeout(function(){t.style.display='none';},2000);}

function api(params){
  params.pw='kodomo5848';
  if(currentGarden) params.garden=currentGarden;
  if(currentYear) params.year=currentYear;
  var url=GAS+'?'+new URLSearchParams(params).toString();
  return fetch(url,{method:'GET',redirect:'follow',mode:'cors'})
    .then(function(r){return r.text();})
    .then(function(t){try{return JSON.parse(t);}catch(e){return{};}});
}
function saveEvents(){return api({action:'saveEvents',eventsJson:JSON.stringify(events)});}

// ===== ログイン =====
$('login-btn').addEventListener('click',function(){
  var garden=$('login-garden').value,pw=$('login-pw').value;
  if(!garden){$('login-err').textContent='園名を選択してください';return;}
  if(!pw){$('login-err').textContent='パスワードを入力してください';return;}
  if(pw!=='kodomo5848'){$('login-err').textContent='パスワードが違います';return;}
  currentGarden=garden;currentClasses=GARDENS[garden]||[];
  $('login-err').textContent='';
  showYearSelect();
});
$('login-pw').addEventListener('keydown',function(e){if(e.key==='Enter') $('login-btn').click();});

function showYearSelect(){
  $('year-garden-name').textContent=currentGarden+'こども保育園';
  var btns=$('year-btns');btns.innerHTML='';
  var now=new Date(),nowY=now.getFullYear(),nowM=now.getMonth()+1;
  var baseY=nowM>=4?nowY:nowY-1;
  var YEARS=[];for(var yi=baseY;yi<=baseY+9;yi++) YEARS.push(yi+'年度');
  YEARS.forEach(function(y){
    var yr=parseInt(y);
    var btn=document.createElement('button');
    btn.className='year-btn'+(yr===baseY?' active':'');
    btn.textContent=y;
    btn.addEventListener('click',function(){
      document.querySelectorAll('.year-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      currentYear=y;
      sessionStorage.setItem('hf_garden',currentGarden);
      sessionStorage.setItem('hf_year',y);
      enterApp();
    });
    btns.appendChild(btn);
  });
  showScreen('s-year');
}

function enterApp(){
  $('ctx-garden').textContent=currentGarden;
  $('ctx-year').textContent=currentYear;
  buildClsChips();
  showScreen('s-home');
  switchTab('input');
  loadAllEntries();
}

// ===== リロード時にセッション復元 =====
(function(){
  var savedGarden=sessionStorage.getItem('hf_garden');
  var savedYear=sessionStorage.getItem('hf_year');
  if(savedGarden&&savedYear&&GARDENS[savedGarden]){
    currentGarden=savedGarden;
    currentClasses=GARDENS[savedGarden];
    currentYear=savedYear;
    enterApp();
  }
})();

// ===== クラスチップ（入力画面） =====
function buildClsChips(){
  var el=$('cls-chips');el.innerHTML='';
  currentClasses.forEach(function(cls){
    var chip=document.createElement('div');
    chip.className='cls-chip';chip.setAttribute('data-cls',cls);
    chip.textContent=cls.replace('クラス','');
    chip.addEventListener('click',function(){
      var idx=selectedClasses.indexOf(cls);
      if(idx>=0){selectedClasses.splice(idx,1);chip.classList.remove('selected');}
      else{selectedClasses.push(cls);chip.classList.add('selected');}
    });
    el.appendChild(chip);
  });
}
function resetClsChips(){selectedClasses=[];document.querySelectorAll('#cls-chips .cls-chip').forEach(function(c){c.classList.remove('selected');});}
function updateClsChipsDone(ev){
  var done=getDoneClasses(ev.name);
  document.querySelectorAll('#cls-chips .cls-chip').forEach(function(chip){
    var cls=chip.getAttribute('data-cls');
    var target=ev.classes||[];
    if(target.indexOf(cls)<0){chip.style.display='none';}
    else{chip.style.display='';if(done[cls])chip.classList.add('done');else chip.classList.remove('done');}
  });
}

// ===== クラスチップ（行事追加） =====
function buildNewEvClsChips(){
  var el=$('new-ev-cls-chips');el.innerHTML='';
  newEvSelectedClasses=[];
  currentClasses.forEach(function(cls){
    var chip=document.createElement('div');
    chip.className='cls-chip';chip.setAttribute('data-cls',cls);
    chip.textContent=cls.replace('クラス','');
    chip.classList.add('selected');newEvSelectedClasses.push(cls);
    chip.addEventListener('click',function(){
      var idx=newEvSelectedClasses.indexOf(cls);
      if(idx>=0){newEvSelectedClasses.splice(idx,1);chip.classList.remove('selected');}
      else{newEvSelectedClasses.push(cls);chip.classList.add('selected');}
    });
    el.appendChild(chip);
  });
}

// ===== クラスチップ（編集モーダル） =====
function buildEditClsChips(targetClasses){
  var el=$('edit-cls-chips');el.innerHTML='';
  editSelectedClasses=targetClasses?targetClasses.slice():currentClasses.slice();
  currentClasses.forEach(function(cls){
    var chip=document.createElement('div');
    chip.className='modal-cls-chip';chip.setAttribute('data-cls',cls);
    chip.textContent=cls.replace('クラス','');
    if(editSelectedClasses.indexOf(cls)>=0) chip.classList.add('selected');
    chip.addEventListener('click',function(){
      var idx=editSelectedClasses.indexOf(cls);
      if(idx>=0){editSelectedClasses.splice(idx,1);chip.classList.remove('selected');}
      else{editSelectedClasses.push(cls);chip.classList.add('selected');}
    });
    el.appendChild(chip);
  });
}

$('back-to-login').addEventListener('click',function(){currentGarden='';currentYear='';showScreen('s-login');});
$('logout-btn').addEventListener('click',function(){
  sessionStorage.removeItem('hf_garden');sessionStorage.removeItem('hf_year');
  currentGarden='';currentYear='';currentClasses=[];events=[];allEntries=[];
  $('login-garden').value='';$('login-pw').value='';
  showScreen('s-login');
});
$('change-year-btn').addEventListener('click',showYearSelect);

// ===== データ =====
function loadAllEntries(){
  api({action:'read'}).then(function(data){
    var rows=data.rows||[];
    allEntries=rows.slice(1).map(function(r){return{event:r[1],cls:r[2],text:r[3]};}).filter(function(r){return r.event;});
    api({action:'getEvents'}).then(function(d){
      events=(d.events||[]).map(function(e){
        if(typeof e==='string') return{name:e,classes:currentClasses.slice()};
        return e;
      });
      renderEvList();renderSumList();
    });
  });
}

function getDoneClasses(evName){
  var done={};
  allEntries.filter(function(e){return e.event===evName;}).forEach(function(e){
    if(!e.cls) return;
    e.cls.split('・').forEach(function(c){done[c.trim()]=true;});
  });
  return done;
}
function getEventClasses(ev){return(ev&&ev.classes&&ev.classes.length)?ev.classes:currentClasses;}

function getProgressBadge(ev){
  var done=getDoneClasses(ev.name);
  var target=getEventClasses(ev);
  var cnt=target.filter(function(c){return done[c];}).length;
  var total=target.length;
  if(cnt===0) return '<span class="progress-badge badge-none">未提出</span>';
  if(cnt===total) return '<span class="progress-badge badge-complete">全員完了✓</span>';
  return '<span class="progress-badge badge-partial">'+cnt+'/'+total+'クラス</span>';
}

function renderClsProgress(containerId,ev){
  var done=getDoneClasses(ev.name);
  var target=getEventClasses(ev);
  var el=$(containerId);el.innerHTML='';
  target.forEach(function(cls){
    var isDone=!!done[cls];
    var item=document.createElement('div');
    item.className='cls-progress-item '+(isDone?'done':'notdone');
    item.innerHTML='<span class="cls-progress-dot"></span>'+cls.replace('クラス','');
    el.appendChild(item);
  });
}

// ===== タブ =====
function switchTab(tab){
  currentTab=tab;
  $('t-input').classList.toggle('active',tab==='input');
  $('t-summary').classList.toggle('active',tab==='summary');
  $('p-input').style.display=tab==='input'?'':'none';
  $('p-summary').style.display=tab==='summary'?'':'none';
  if(tab==='summary') renderSumList();else renderEvList();
}
function goHome(){renderEvList();renderSumList();showScreen('s-home');}

// ===== ドラッグ（PC） =====
var dragSrcIndex=-1;
function onDragStart(e,idx){dragSrcIndex=idx;e.dataTransfer.effectAllowed='move';}
function onDragOver(e,el){e.preventDefault();document.querySelectorAll('.list-item').forEach(function(i){i.classList.remove('drag-over');});el.classList.add('drag-over');}
function onDrop(e,idx){e.preventDefault();document.querySelectorAll('.list-item').forEach(function(i){i.classList.remove('drag-over');});if(dragSrcIndex===idx) return;var m=events.splice(dragSrcIndex,1)[0];events.splice(idx,0,m);renderEvList();saveEvents();}

// ===== タッチドラッグ =====
var touchDragIndex=-1,touchClone=null,touchStartY=0;
function onTouchStart(e,idx){touchDragIndex=idx;touchStartY=e.touches[0].clientY;var el=e.currentTarget.closest('.list-item');touchClone=el.cloneNode(true);touchClone.style.cssText='position:fixed;left:0;right:0;z-index:200;opacity:0.85;background:#e8f0fe;pointer-events:none;';touchClone.style.top=el.getBoundingClientRect().top+'px';document.body.appendChild(touchClone);}
function onTouchMove(e){if(touchDragIndex<0||!touchClone) return;e.preventDefault();var y=e.touches[0].clientY;touchClone.style.top=(parseFloat(touchClone.style.top)+(y-touchStartY))+'px';touchStartY=y;document.querySelectorAll('.list-item').forEach(function(i){i.classList.remove('drag-over');});var over=document.elementFromPoint(e.touches[0].clientX,y);if(over){var item=over.closest('.list-item');if(item) item.classList.add('drag-over');}}
function onTouchEnd(e){if(touchDragIndex<0) return;if(touchClone){document.body.removeChild(touchClone);touchClone=null;}document.querySelectorAll('.list-item').forEach(function(i){i.classList.remove('drag-over');});var y=e.changedTouches[0].clientY;var over=document.elementFromPoint(e.changedTouches[0].clientX,y);if(over){var item=over.closest('.list-item');if(item){var idx=parseInt(item.getAttribute('data-idx'));if(!isNaN(idx)&&idx!==touchDragIndex){var m=events.splice(touchDragIndex,1)[0];events.splice(idx,0,m);renderEvList();saveEvents();}}}touchDragIndex=-1;}
document.addEventListener('touchmove',onTouchMove,{passive:false});
document.addEventListener('touchend',onTouchEnd);

// ===== 長押し =====
var longPressTimer=null;
function startLongPress(idx){longPressTimer=setTimeout(function(){openEditModal(idx);},600);}
function cancelLongPress(){if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}}
function openEditModal(idx){editingIndex=idx;$('edit-ev-input').value=events[idx].name;buildEditClsChips(events[idx].classes);$('edit-modal').classList.add('active');setTimeout(function(){$('edit-ev-input').focus();},100);}
function closeEditModal(){$('edit-modal').classList.remove('active');editingIndex=-1;}

// ===== 描画 =====
function renderEvList(){
  var el=$('ev-list');el.innerHTML='';
  if(!events.length){el.innerHTML='<p class="empty">行事がまだありません</p>';return;}
  events.forEach(function(ev,idx){
    var done=getDoneClasses(ev.name);
    var target=getEventClasses(ev);
    var item=document.createElement('div');
    item.className='list-item';item.setAttribute('draggable','true');item.setAttribute('data-idx',idx);
    var dotsHtml=target.map(function(cls){
      return '<span class="cls-dot-item"><span class="dot-sm '+(done[cls]?'dot-green':'dot-gray')+'"></span>'+cls.replace('歳児クラス','歳')+'</span>';
    }).join('');
    item.innerHTML='<div class="drag-handle">☰</div><div class="list-item-main"><div class="list-item-name">'+ev.name+'</div><div class="cls-status-row">'+dotsHtml+'</div></div><button class="go-btn">›</button>';
    item.addEventListener('dragstart',function(e){onDragStart(e,idx);});
    item.addEventListener('dragover',function(e){onDragOver(e,item);});
    item.addEventListener('drop',function(e){onDrop(e,idx);});
    item.querySelector('.drag-handle').addEventListener('touchstart',function(e){onTouchStart(e,idx);},{passive:true});
    var main=item.querySelector('.list-item-main');
    main.addEventListener('mousedown',function(){startLongPress(idx);});
    main.addEventListener('mouseup',cancelLongPress);
    main.addEventListener('mouseleave',cancelLongPress);
    main.addEventListener('touchstart',function(){startLongPress(idx);},{passive:true});
    main.addEventListener('touchend',cancelLongPress);
    main.addEventListener('touchmove',cancelLongPress);
    item.querySelector('.go-btn').addEventListener('click',function(e){e.stopPropagation();openInput(ev);});
    el.appendChild(item);
  });
}

function renderSumList(){
  var el=$('sum-list');el.innerHTML='';
  if(!events.length){el.innerHTML='<p class="empty">行事がまだありません</p>';return;}
  events.forEach(function(ev){
    var done=getDoneClasses(ev.name);
    var target=getEventClasses(ev);
    var item=document.createElement('div');
    item.style.cssText='display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #e5e5ea;background:#fff;cursor:pointer;';
    item.addEventListener('click',function(){openEntries(ev);});
    var dotsHtml=target.map(function(cls){
      return '<span class="cls-dot-item"><span class="dot-sm '+(done[cls]?'dot-green':'dot-gray')+'"></span>'+cls.replace('歳児クラス','歳')+'</span>';
    }).join('');
    item.innerHTML='<div style="flex:1;"><div style="font-size:16px;font-weight:500;margin-bottom:5px;">'+ev.name+'</div><div class="cls-status-row">'+dotsHtml+'</div></div><div style="margin-left:8px;">'+getProgressBadge(ev)+'</div>';
    el.appendChild(item);
  });
}

function openInput(ev){
  currentEvent=ev;$('input-title').textContent=ev.name;
  resetClsChips();$('hansei').value='';$('input-err').textContent='';
  $('submit-btn').disabled=false;$('submit-btn').textContent='送信する';
  renderClsProgress('input-cls-progress',ev);
  updateClsChipsDone(ev);
  showScreen('s-input');
}

function openEntries(ev){
  currentEvent=ev;currentFilter='all';
  $('entries-title').textContent=ev.name;
  $('entries-list').innerHTML='<p class="empty">読み込み中...</p>';
  $('copy-box').textContent='';
  renderClsProgress('entries-cls-progress',ev);
  showScreen('s-entries');loadEntries();
}

function loadEntries(){
  $('entries-list').innerHTML='<p class="empty">読み込み中...</p>';
  api({action:'read'}).then(function(data){
    var rows=data.rows||[];
    allEntries=rows.slice(1).map(function(r){return{event:r[1],cls:r[2],text:r[3]};}).filter(function(r){return r.event;});
    renderSumList();renderEvList();
    renderClsProgress('entries-cls-progress',currentEvent);
    renderEntries();
  }).catch(function(){$('entries-list').innerHTML='<p class="empty">読み込みに失敗しました。再読み込みしてください。</p>';});
}

function renderEntries(){
  var entries=allEntries.filter(function(e){return e.event===currentEvent.name;});
  var cr=$('chips');cr.innerHTML='';
  var ac=document.createElement('div');ac.className='chip'+(currentFilter==='all'?' active':'');ac.textContent='すべて';
  ac.addEventListener('click',function(){currentFilter='all';renderEntries();});cr.appendChild(ac);
  var clsSet={};
  entries.forEach(function(e){if(e.cls) clsSet[e.cls]=true;});
  Object.keys(clsSet).forEach(function(c){
    var ch=document.createElement('div');ch.className='chip'+(currentFilter===c?' active':'');ch.textContent=c;
    ch.addEventListener('click',function(){currentFilter=c;renderEntries();});cr.appendChild(ch);
  });
  var filtered=currentFilter==='all'?entries:entries.filter(function(e){return e.cls===currentFilter;});
  var list=$('entries-list');list.innerHTML='';
  if(!filtered.length){list.innerHTML='<p class="empty">まだ反省が入力されていません</p>';$('copy-box').textContent='';return;}
  filtered.forEach(function(e){
    var d=document.createElement('div');d.className='entry';
    var t=(e.text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var c=(e.cls||'').replace(/</g,'&lt;');
    d.innerHTML='<span class="entry-cls">'+c+'</span><div class="entry-txt">'+t+'</div>';
    list.appendChild(d);
  });
  var target=getEventClasses(currentEvent);
  var sorted=[];
  target.forEach(function(cls){filtered.filter(function(e){return e.cls===cls;}).forEach(function(e){sorted.push(e);});});
  filtered.filter(function(e){return target.indexOf(e.cls)<0;}).forEach(function(e){sorted.push(e);});
  $('copy-box').textContent=sorted.map(function(e){return'【'+e.cls+'】\n'+e.text;}).join('\n\n');
}

function submitHansei(){
  var text=$('hansei').value.trim(),err=$('input-err');
  if(!selectedClasses.length){err.textContent='クラスを選択してください';return;}
  if(!text){err.textContent='反省を入力してください';return;}
  err.textContent='';$('submit-btn').disabled=true;$('submit-btn').textContent='送信中...';
  api({action:'write',event:currentEvent.name,cls:selectedClasses.join('・'),text:text}).then(function(){
    showScreen('s-success');
  }).catch(function(){err.textContent='送信に失敗しました。もう一度お試しください。';$('submit-btn').disabled=false;$('submit-btn').textContent='送信する';});
}

function addEvent(){
  var name=$('new-ev').value.trim(),err=$('add-err');
  if(!name){err.textContent='行事名を入力してください';return;}
  if(events.some(function(e){return e.name===name;})){err.textContent='その行事は既に登録されています';return;}
  if(!newEvSelectedClasses.length){err.textContent='対象クラスを選択してください';return;}
  events.unshift({name:name,classes:newEvSelectedClasses.slice()});
  saveEvents().then(function(){$('new-ev').value='';err.textContent='';goHome();});
}

$('t-input').addEventListener('click',function(){switchTab('input');});
$('t-summary').addEventListener('click',function(){switchTab('summary');});
$('back-input').addEventListener('click',goHome);
$('back-entries').addEventListener('click',goHome);
$('back-add').addEventListener('click',goHome);
$('back-success').addEventListener('click',goHome);
$('cancel-btn').addEventListener('click',goHome);
$('cancel-add-btn').addEventListener('click',goHome);
$('submit-btn').addEventListener('click',submitHansei);
$('save-ev-btn').addEventListener('click',addEvent);
$('reload-btn').addEventListener('click',loadEntries);
$('copy-btn').addEventListener('click',function(){
  var text=$('copy-box').textContent;
  if(!text){showToast('コピーするデータがありません');return;}
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){showToast();});}
  else{var r=document.createRange();r.selectNodeContents($('copy-box'));window.getSelection().removeAllRanges();window.getSelection().addRange(r);document.execCommand('copy');showToast();}
});
$('btn-add-ev').addEventListener('click',function(){buildNewEvClsChips();$('add-err').textContent='';showScreen('s-add');});
$('edit-save-btn').addEventListener('click',function(){
  var name=$('edit-ev-input').value.trim();
  if(!name){alert('行事名を入力してください');return;}
  if(events.some(function(e,i){return e.name===name&&i!==editingIndex;})){alert('その行事名は既に存在します');return;}
  if(!editSelectedClasses.length){alert('対象クラスを選択してください');return;}
  events[editingIndex]={name:name,classes:editSelectedClasses.slice()};
  saveEvents().then(function(){closeEditModal();renderEvList();renderSumList();showToast('行事を更新しました');});
});
$('edit-delete-btn').addEventListener('click',function(){
  if(!confirm('「'+events[editingIndex].name+'」を削除しますか？\n※入力済みの反省データは残ります')) return;
  events.splice(editingIndex,1);
  saveEvents().then(function(){closeEditModal();renderEvList();showToast('削除しました');});
});
$('edit-cancel-btn').addEventListener('click',closeEditModal);
$('edit-modal').addEventListener('click',function(e){if(e.target===$('edit-modal')) closeEditModal();});
</script>
