<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>行事反省システム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(0,0,0,0.1);}
html,body{height:100%;background:#f2f2f7;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;color:#1c1c1e;}
.app{max-width:560px;margin:0 auto;padding-bottom:40px;}
.screen{display:none;}.screen.active{display:block;}
.navbar{background:#fff;padding:14px 16px 10px;border-bottom:1px solid #e5e5ea;position:sticky;top:0;z-index:10;}
.navbar-title{font-size:18px;font-weight:700;margin-bottom:8px;}
.seg{display:flex;background:#e5e5ea;border-radius:9px;padding:2px;}
.seg button{flex:1;padding:8px;border:none;background:transparent;border-radius:7px;font-size:14px;font-weight:500;color:#666;cursor:pointer;}
.seg button.active{background:#fff;color:#1c1c1e;font-weight:600;}
.content{padding:16px;}
.sec-title{font-size:12px;font-weight:600;color:#8e8e93;letter-spacing:.05em;margin-bottom:8px;}
.list-group{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:16px;}
.list-btn{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border:none;border-bottom:1px solid #e5e5ea;background:#fff;width:100%;text-align:left;cursor:pointer;font-size:16px;font-weight:500;color:#1c1c1e;}
.list-btn:last-child{border-bottom:none;}
.list-btn:active{background:#f2f2f7;}
.badge-count{font-size:13px;color:#8e8e93;background:#f2f2f7;padding:3px 10px;border-radius:10px;}
.arrow{color:#c7c7cc;font-size:20px;}
.form-group{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:16px;}
.form-row{padding:13px 16px;border-bottom:1px solid #e5e5ea;}
.form-row:last-child{border-bottom:none;}
.form-label{font-size:12px;color:#8e8e93;margin-bottom:5px;}
select,textarea,input{width:100%;border:none;outline:none;font-size:16px;font-family:inherit;background:transparent;color:#1c1c1e;-webkit-appearance:none;}
textarea{min-height:160px;resize:none;line-height:1.6;}
.btn-p{display:block;width:100%;padding:16px;background:#007AFF;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;margin-bottom:10px;}
.btn-p:active{background:#0062cc;}
.btn-s{display:block;width:100%;padding:16px;background:#fff;color:#007AFF;border:none;border-radius:12px;font-size:17px;cursor:pointer;margin-bottom:10px;}
.back{color:#007AFF;font-size:16px;cursor:pointer;padding:4px 0;margin-bottom:4px;display:inline-block;}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:7px 14px;background:#fff;border:1px solid #ddd;border-radius:20px;font-size:13px;color:#555;cursor:pointer;}
.chip.active{background:#007AFF;color:#fff;border-color:#007AFF;}
.entry{background:#fff;border-radius:12px;padding:13px 16px;margin-bottom:10px;}
.entry-cls{display:inline-block;font-size:12px;padding:2px 8px;border-radius:8px;background:#e8f0fe;color:#1a56db;margin-bottom:6px;}
.entry-txt{font-size:15px;line-height:1.6;white-space:pre-wrap;}
.copy-box{background:#fff;border-radius:12px;padding:14px 16px;font-size:14px;white-space:pre-wrap;line-height:1.7;min-height:60px;margin-bottom:12px;}
.empty{text-align:center;padding:40px;color:#8e8e93;font-size:15px;}
.err{color:#ff3b30;font-size:14px;margin-top:8px;}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;display:none;z-index:999;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
.dg{background:#34c759;}.dgr{background:#c7c7cc;}
.success-wrap{text-align:center;padding:60px 20px;}
.success-icon{font-size:64px;margin-bottom:16px;}
.success-title{font-size:22px;font-weight:700;margin-bottom:8px;}
.success-sub{font-size:15px;color:#8e8e93;margin-bottom:32px;}
</style>
</head>
<body>
<div class="app">

<div id="s-home" class="screen active">
  <div class="navbar">
    <div class="navbar-title">行事反省システム</div>
    <div class="seg">
      <button id="t-input">入力</button>
      <button id="t-summary">取りまとめ</button>
    </div>
  </div>
  <div class="content">
    <div id="p-input">
      <p class="sec-title">行事を選択</p>
      <div class="list-group" id="ev-list"><p class="empty">読み込み中...</p></div>
      <button class="btn-s" id="btn-add-ev">＋ 行事を追加</button>
    </div>
    <div id="p-summary" style="display:none">
      <p class="sec-title">反省取りまとめ</p>
      <div class="list-group" id="sum-list"><p class="empty">読み込み中...</p></div>
    </div>
  </div>
</div>

<div id="s-input" class="screen">
  <div class="navbar">
    <div class="back" id="back-input">‹ 行事一覧</div>
    <div class="navbar-title" id="input-title"></div>
  </div>
  <div class="content">
    <div class="form-group">
      <div class="form-row">
        <div class="form-label">記入者クラス</div>
        <select id="cls-sel">
          <option value="">選択してください</option>
          <option>0歳児クラス</option>
          <option>1歳児クラス</option>
          <option>2歳児クラス</option>
          <option>3歳児クラス</option>
          <option>4歳児クラス</option>
          <option>5歳児クラス</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-label">反省・気づき</div>
        <textarea id="hansei" placeholder="気づいたこと、改善点、良かった点など"></textarea>
      </div>
    </div>
    <button class="btn-p" id="submit-btn">送信する</button>
    <button class="btn-s" id="cancel-btn">キャンセル</button>
    <p class="err" id="input-err"></p>
  </div>
</div>

<div id="s-entries" class="screen">
  <div class="navbar">
    <div class="back" id="back-entries">‹ 行事一覧</div>
    <div class="navbar-title" id="entries-title"></div>
  </div>
  <div class="content">
    <button class="btn-s" id="reload-btn" style="padding:10px;margin-bottom:12px;">再読み込み</button>
    <div class="chips" id="chips"></div>
    <div id="entries-list"></div>
    <p class="sec-title">まとめてコピー</p>
    <div class="copy-box" id="copy-box"></div>
    <button class="btn-p" id="copy-btn">まとめてコピー</button>
  </div>
</div>

<div id="s-add" class="screen">
  <div class="navbar">
    <div class="back" id="back-add">‹ 行事一覧</div>
    <div class="navbar-title">行事を追加</div>
  </div>
  <div class="content">
    <div class="form-group">
      <div class="form-row">
        <div class="form-label">行事名</div>
        <input type="text" id="new-ev" placeholder="例：運動会、お遊戯会...">
      </div>
    </div>
    <button class="btn-p" id="save-ev-btn">追加する</button>
    <button class="btn-s" id="cancel-add-btn">キャンセル</button>
  </div>
</div>

<div id="s-success" class="screen">
  <div class="success-wrap">
    <div class="success-icon">✅</div>
    <div class="success-title">送信しました</div>
    <div class="success-sub">スプレッドシートに保存されました</div>
    <button class="btn-p" id="back-success">行事一覧に戻る</button>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
var GAS = 'https://script.google.com/macros/s/AKfycbxcoORrvnJMx2yL_Nsp8GP0NaYwNqo9HMmWaJ1qB-4xo7fMvdyAVoYcW35DwcRfi1b9qQ/exec';
var CLASS_ORDER = ['0歳児クラス','1歳児クラス','2歳児クラス','3歳児クラス','4歳児クラス','5歳児クラス'];
var events = [], currentEvent = '', currentFilter = 'all', currentTab = 'input', allEntries = [];
var cbCount = 0;

function $(i){ return document.getElementById(i); }

function showScreen(i){
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  $(i).classList.add('active');
  window.scrollTo(0,0);
}

function showToast(m){
  var t = $('toast');
  t.textContent = m || 'コピーしました';
  t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 2000);
}

function api(params){
  return new Promise(function(resolve, reject){
    var name = 'cb' + (cbCount++);
    var timer = setTimeout(function(){ reject(new Error('timeout')); }, 10000);
    window[name] = function(data){
      clearTimeout(timer);
      delete window[name];
      if(sc.parentNode) sc.parentNode.removeChild(sc);
      resolve(data);
    };
    params.callback = name;
    var sc = document.createElement('script');
    sc.onerror = function(){ clearTimeout(timer); reject(new Error('error')); };
    sc.src = GAS + '?' + new URLSearchParams(params).toString();
    document.head.appendChild(sc);
  });
}

function switchTab(tab){
  currentTab = tab;
  $('t-input').classList.toggle('active', tab === 'input');
  $('t-summary').classList.toggle('active', tab === 'summary');
  $('p-input').style.display = tab === 'input' ? '' : 'none';
  $('p-summary').style.display = tab === 'summary' ? '' : 'none';
  if(tab === 'summary') renderSumList(); else renderEvList();
}

function goHome(){ renderEvList(); renderSumList(); showScreen('s-home'); }

function renderEvList(){
  var el = $('ev-list'); el.innerHTML = '';
  if(!events.length){ el.innerHTML = '<p class="empty">行事がまだありません</p>'; return; }
  events.forEach(function(ev){
    var b = document.createElement('button');
    b.className = 'list-btn';
    b.innerHTML = '<span>' + ev + '</span><span class="arrow">›</span>';
    b.addEventListener('click', function(){ openInput(ev); });
    el.appendChild(b);
  });
}

function renderSumList(){
  var el = $('sum-list'); el.innerHTML = '';
  if(!events.length){ el.innerHTML = '<p class="empty">行事がまだありません</p>'; return; }
  events.forEach(function(ev){
    var cnt = allEntries.filter(function(e){ return e.event === ev; }).length;
    var b = document.createElement('button');
    b.className = 'list-btn';
    var dot = cnt > 0 ? 'dg' : 'dgr';
    b.innerHTML = '<span><span class="dot ' + dot + '"></span>' + ev + '</span><span class="badge-count">' + cnt + '件</span>';
    b.addEventListener('click', function(){ openEntries(ev); });
    el.appendChild(b);
  });
}

function openInput(ev){
  currentEvent = ev;
  $('input-title').textContent = ev;
  $('cls-sel').value = '';
  $('hansei').value = '';
  $('input-err').textContent = '';
  $('submit-btn').disabled = false;
  $('submit-btn').textContent = '送信する';
  showScreen('s-input');
}

function openEntries(ev){
  currentEvent = ev; currentFilter = 'all';
  $('entries-title').textContent = ev;
  $('entries-list').innerHTML = '<p class="empty">読み込み中...</p>';
  $('copy-box').textContent = '';
  showScreen('s-entries');
  loadEntries();
}

function loadEntries(){
  $('entries-list').innerHTML = '<p class="empty">読み込み中...</p>';
  api({action:'read'}).then(function(data){
    var rows = data.rows || [];
    allEntries = rows.slice(1).map(function(r){ return {event:r[1], cls:r[2], text:r[3]}; }).filter(function(r){ return r.event; });
    renderSumList();
    renderEntries();
  }).catch(function(){
    $('entries-list').innerHTML = '<p class="empty">読み込みに失敗しました。再読み込みしてください。</p>';
  });
}

function renderEntries(){
  var entries = allEntries.filter(function(e){ return e.event === currentEvent; });
  var cr = $('chips'); cr.innerHTML = '';
  var ac = document.createElement('div');
  ac.className = 'chip' + (currentFilter === 'all' ? ' active' : '');
  ac.textContent = 'すべて';
  ac.addEventListener('click', function(){ currentFilter = 'all'; renderEntries(); });
  cr.appendChild(ac);
  CLASS_ORDER.filter(function(c){ return entries.some(function(e){ return e.cls === c; }); }).forEach(function(c){
    var ch = document.createElement('div');
    ch.className = 'chip' + (currentFilter === c ? ' active' : '');
    ch.textContent = c;
    ch.addEventListener('click', function(){ currentFilter = c; renderEntries(); });
    cr.appendChild(ch);
  });
  var filtered = currentFilter === 'all' ? entries : entries.filter(function(e){ return e.cls === currentFilter; });
  var list = $('entries-list'); list.innerHTML = '';
  if(!filtered.length){
    list.innerHTML = '<p class="empty">まだ反省が入力されていません</p>';
    $('copy-box').textContent = '';
    return;
  }
  CLASS_ORDER.forEach(function(cls){
    filtered.filter(function(e){ return e.cls === cls; }).forEach(function(e){
      var d = document.createElement('div'); d.className = 'entry';
      var t = (e.text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      var c = (e.cls||'').replace(/</g,'&lt;');
      d.innerHTML = '<span class="entry-cls">' + c + '</span><div class="entry-txt">' + t + '</div>';
      list.appendChild(d);
    });
  });
  var sorted = CLASS_ORDER.reduce(function(a,c){ return a.concat(filtered.filter(function(e){ return e.cls===c; })); }, []);
  $('copy-box').textContent = sorted.map(function(e){ return '【' + e.cls + '】\n' + e.text; }).join('\n\n');
}

function submitHansei(){
  var cls = $('cls-sel').value;
  var text = $('hansei').value.trim();
  var err = $('input-err');
  if(!cls){ err.textContent = 'クラスを選択してください'; return; }
  if(!text){ err.textContent = '反省を入力してください'; return; }
  err.textContent = '';
  $('submit-btn').disabled = true;
  $('submit-btn').textContent = '送信中...';
  api({action:'write', event:currentEvent, cls:cls, text:text}).then(function(){
    showScreen('s-success');
  }).catch(function(){
    err.textContent = '送信に失敗しました。もう一度お試しください。';
    $('submit-btn').disabled = false;
    $('submit-btn').textContent = '送信する';
  });
}

function addEvent(){
  var name = $('new-ev').value.trim();
  if(!name){ alert('行事名を入力してください'); return; }
  if(events.indexOf(name) >= 0){ alert('その行事は既に登録されています'); return; }
  api({action:'saveEvent', name:name}).then(function(data){
    events = data.events || events;
    $('new-ev').value = '';
    goHome();
  });
}

function copyAll(){
  var text = $('copy-box').textContent;
  if(!text){ showToast('コピーするデータがありません'); return; }
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){ showToast(); });
  } else {
    var r = document.createRange();
    r.selectNodeContents($('copy-box'));
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(r);
    document.execCommand('copy');
    showToast();
  }
}

$('t-input').addEventListener('click', function(){ switchTab('input'); });
$('t-summary').addEventListener('click', function(){ switchTab('summary'); });
$('back-input').addEventListener('click', goHome);
$('back-entries').addEventListener('click', goHome);
$('back-add').addEventListener('click', goHome);
$('back-success').addEventListener('click', goHome);
$('cancel-btn').addEventListener('click', goHome);
$('cancel-add-btn').addEventListener('click', goHome);
$('submit-btn').addEventListener('click', submitHansei);
$('save-ev-btn').addEventListener('click', addEvent);
$('reload-btn').addEventListener('click', loadEntries);
$('copy-btn').addEventListener('click', copyAll);
$('btn-add-ev').addEventListener('click', function(){ showScreen('s-add'); });

switchTab('input');
api({action:'getEvents'}).then(function(data){
  events = data.events || [];
  renderEvList();
}).catch(function(){
  events = ['運動会','お遊戯会','遠足','夏祭り','クリスマス会'];
  renderEvList();
});
</script>
</body>
</html>
